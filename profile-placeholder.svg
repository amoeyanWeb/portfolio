<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e2d4a"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- body -->
  <ellipse cx="100" cy="155" rx="52" ry="38" fill="#1a3050" clip-path="url(#circle)"/>
  <!-- head -->
  <circle cx="100" cy="82" r="34" fill="#2a4060"/>
  <!-- subtle highlight -->
  <ellipse cx="88" cy="70" rx="10" ry="7" fill="#3a5070" opacity="0.5"/>
  <!-- gold ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <!-- text -->
  <text x="100" y="192" font-family="sans-serif" font-size="10" fill="#c9a84c" text-anchor="middle" opacity="0.7">عکس شما</text>
</svg>
